<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель администратора | Tea Master HUB</title>
    
    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./css/navigation.css">
    <link rel="stylesheet" href="./css/admin.css">
</head>
<body>
    <div class="bg-overlay"></div>

    <div id="nav-placeholder"></div>

    <main class="container">
        <header style="margin-bottom: 40px;">
            <h1>Панель управления</h1>
            <p style="color: var(--text-dim);">Мониторинг обучения и управление персоналом</p>
        </header>

        <div class="admin-layout">
            <section class="glass-card">
                <div class="calendar-header">
                    <h3>Май 2026</h3>
                    <div class="calendar-controls">
                        <button id="prev-month">&lt;</button>
                        <button id="next-month">&gt;</button>
                    </div>
                </div>
                
                <div id="calendar-grid" class="calendar-grid">
                    <div class="day-cell" style="color: var(--accent-gold);">Пн</div>
                    <div class="day-cell" style="color: var(--accent-gold);">Вт</div>
                    <div class="day-cell" style="color: var(--accent-gold);">Ср</div>
                    <div class="day-cell" style="color: var(--accent-gold);">Чт</div>
                    <div class="day-cell" style="color: var(--accent-gold);">Пт</div>
                    <div class="day-cell" style="color: var(--accent-gold);">Сб</div>
                    <div class="day-cell" style="color: var(--accent-gold);">Вс</div>
                    </div>

                <div style="margin-top: 30px;">
                    <h4>Заметки на сегодня</h4>
                    <div id="admin-notes" style="margin-top: 15px;">
                        <p style="font-size: 0.9rem; border-left: 2px solid var(--accent-gold); padding-left: 15px;">
                            Проверить аттестацию новых сотрудников по разделу "Улуны".
                        </p>
                    </div>
                </div>
            </section>

            <aside style="display: flex; flex-direction: column; gap: 30px;">
                <section class="glass-card">
                    <h3>Прогресс команды</h3>
                    <div id="employee-stats" style="margin-top: 20px;">
                        </div>
                </section>

                <section class="glass-card">
                    <h3>Объявления</h3>
                    <textarea id="announcement-text" placeholder="Введите текст для всех сотрудников..." 
                        style="width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); 
                        border-radius: 10px; color: white; padding: 10px; margin: 15px 0; min-height: 80px;"></textarea>
                    <button style="width: 100%;" onclick="alert('Уведомление отправлено!')">Опубликовать</button>
                </section>
            </aside>
        </div>
    </main>

    <script type="module" src="./js/main.js"></script>
</body>
</html>
